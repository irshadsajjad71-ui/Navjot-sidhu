<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Service - Coming Soon</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
            background-color: #061D19;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
            overflow: hidden;
            position: relative;
        }

        /* Decorative background elements matching main site */
        body::before {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            background: rgba(110, 148, 25, 0.15);
            border-radius: 50%;
            top: -50px;
            left: -50px;
            filter: blur(80px);
            z-index: 1;
        }

        body::after {
            content: '';
            position: absolute;
            width: 400px;
            height: 400px;
            background: rgba(110, 148, 25, 0.1);
            border-radius: 50%;
            bottom: -100px;
            right: -100px;
            filter: blur(100px);
            z-index: 1;
        }

        .container {
            position: relative;
            z-index: 2;
            max-width: 600px;
            padding: 40px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
        }

        .logo {
            font-size: 32px;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 24px;
            letter-spacing: 1px;
        }

        .logo span {
            color: #6E9419;
        }

        h1 {
            font-size: 48px;
            font-weight: 700;
            margin: 0 0 16px 0;
            line-height: 1.2;
            background: linear-gradient(90deg, #ffffff 0%, #6E9419 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            font-size: 18px;
            color: rgba(255, 255, 255, 0.7);
            margin: 0 0 32px 0;
            line-height: 1.6;
        }

        .btn {
            display: inline-block;
            padding: 16px 36px;
            font-size: 16px;
            font-weight: 600;
            text-transform: uppercase;
            color: #ffffff;
            background-color: #6E9419;
            text-decoration: none;
            border-radius: 8px;
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }

        .btn:hover {
            background-color: transparent;
            border-color: #6E9419;
            color: #6E9419;
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(110, 148, 25, 0.2);
        }

        .footer {
            margin-top: 40px;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.4);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">Daily Khabar <span>NZ</span></div>
        <h1>Our Service</h1><h2 style='font-size:24px;color:#6E9419;margin-top:0;'>Coming Soon</h2>
        <p>We are working hard to bring you the content for this page. Stay tuned as we build exciting new features and community stories!</p>
        <a href="/" class="btn">Back to Home</a>
        <div class="footer">
            © Navjot Sidhu 2026. All Right Reserved
        </div>
    </div>
</body>
</html>
